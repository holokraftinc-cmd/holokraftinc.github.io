<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#335C4A"/>
  <!-- Background pattern -->
  <circle cx="1050" cy="100" r="300" fill="rgba(255,255,255,0.04)"/>
  <circle cx="150" cy="530" r="250" fill="rgba(255,255,255,0.03)"/>
  <!-- Logo icon -->
  <rect x="80" y="200" width="90" height="90" rx="20" fill="#4A7A62"/>
  <path d="M100 230h50M100 245h35M100 260h28" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <circle cx="155" cy="260" r="16" fill="#6E8B74"/>
  <path d="M149 260l4 4 8-8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- App name -->
  <text x="190" y="255" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="64" fill="white">Noted</text>
  <text x="190" y="285" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="24" fill="rgba(255,255,255,0.65)">Day Planner</text>
  <!-- Tagline -->
  <text x="80" y="360" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="36" fill="rgba(255,255,255,0.9)">Plan today. Achieve tomorrow.</text>
  <!-- Feature pills -->
  <rect x="80" y="400" width="160" height="40" rx="20" fill="rgba(255,255,255,0.12)"/>
  <text x="160" y="425" font-family="Inter, sans-serif" font-size="18" fill="white" text-anchor="middle">Tasks</text>
  <rect x="255" y="400" width="140" height="40" rx="20" fill="rgba(255,255,255,0.12)"/>
  <text x="325" y="425" font-family="Inter, sans-serif" font-size="18" fill="white" text-anchor="middle">Notes</text>
  <rect x="410" y="400" width="180" height="40" rx="20" fill="rgba(255,255,255,0.12)"/>
  <text x="500" y="425" font-family="Inter, sans-serif" font-size="18" fill="white" text-anchor="middle">Smart Lists</text>
  <rect x="605" y="400" width="240" height="40" rx="20" fill="rgba(255,255,255,0.12)"/>
  <text x="725" y="425" font-family="Inter, sans-serif" font-size="18" fill="white" text-anchor="middle">Calendar Sync</text>
  <!-- Google Play badge area -->
  <rect x="80" y="460" width="280" height="56" rx="12" fill="rgba(255,255,255,0.15)"/>
  <text x="170" y="482" font-family="Inter, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" text-anchor="middle">GET IT ON</text>
  <text x="170" y="504" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">Google Play</text>
  <!-- Company -->
  <text x="1120" y="590" font-family="Inter, sans-serif" font-size="16" fill="rgba(255,255,255,0.4)" text-anchor="end">Holokraft Apps</text>
</svg>
